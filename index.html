<!DOCTYPE html>
<html lang="ja">
<!-- ═══════════════════════════════════════════════════════════════
  Cinematic LP Kit — 入口ファイル（これは触らない）
  config.js の engine を見て、実写(engine-photo)か粒子(engine-particles)へ切り替えるだけ。
  編集するのは config.js だけ。Claude Code に「/start」と打てば会話で作ってくれる。
  ═══════════════════════════════════════════════════════════════ -->
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cinematic LP</title>
<style>
  html,body{margin:0;height:100%;background:#040406;color:#f4f1ea;
    font-family:'Space Mono',ui-monospace,monospace;overflow:hidden}
  .load{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .load b{font-size:22px;letter-spacing:.24em;font-weight:700}
  .load small{font-size:10px;letter-spacing:.42em;color:#7c7870}
  .load i{display:block;width:120px;height:1px;background:#26241f;overflow:hidden}
  .load i::after{content:'';display:block;height:100%;width:40%;background:#ffc46b;
    animation:sl 1.1s ease-in-out infinite}
  @keyframes sl{0%{transform:translateX(-120%)}100%{transform:translateX(320%)}}
</style>
</head>
<body>
  <div class="load"><small>LOADING</small><b id="bn">·</b><i></i></div>
  <script src="config.js"></script>
  <script>
    (function(){
      var C = window.LP_CONFIG || {};
      var bn = document.getElementById('bn');
      if (bn && C.brand) bn.textContent = C.brand;
      // engine を正規化（大文字/前後空白/誤記に強く）。既定は photo
      var raw = String(C.engine || '').trim().toLowerCase();
      var engine = (raw === 'particles') ? 'particles'
                 : (raw === 'photo' || raw === '') ? 'photo'
                 : (console.warn('[LP_CONFIG] engine の値 "' + C.engine + '" は不正です。photo で表示します（有効値: photo / particles）。'), 'photo');
      var target = engine === 'particles' ? 'engine-particles.html' : 'engine-photo.html';
      // ?engine=particles / ?engine=photo で一時的に上書きして見比べられる
      var q = String(new URLSearchParams(location.search).get('engine') || '').trim().toLowerCase();
      if (q === 'particles') target = 'engine-particles.html';
      if (q === 'photo') target = 'engine-photo.html';
      location.replace(target + location.hash);
    })();
  </script>
</body>
</html>
